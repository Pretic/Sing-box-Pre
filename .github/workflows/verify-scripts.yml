name: Verify scripts

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bash-syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Bash syntax
        shell: bash
        run: |
          set -euo pipefail

          checked=0
          while IFS= read -r -d '' script; do
            echo "Checking ${script}"
            bash -n "${script}"
            checked=$((checked + 1))
          done < <(find . -type f -name '*.sh' -print0)

          if [[ "${checked}" -eq 0 ]]; then
            echo "No shell scripts found" >&2
            exit 1
          fi

          echo "Verified ${checked} shell scripts"
